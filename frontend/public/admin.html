<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GalacticGamble Admin</title>
        <link rel="stylesheet" type="text/css" href="css/admin.css">

    </head>
    <body>
        <h1>Admin Panel <span id="status">❌ Disconected</span></h1>
        <button id="startBtn">🚀 Space Launch 🚀</button>

        <span >
            <button id="simulateAllBtn">Simulate All Presets ⚙️</button>
            <button id="simulateFastBtn">Simulate Fast ⚡</button>
            <button id="simulateActualBtn">Simulate Actual Preset 🗳️</button>
        </span>


        <h2>Add Bet</h2>
        <form id="betForm">
        <input type="text" id="user" placeholder="Name" required>
        <input type="number" id="amount" placeholder="Amount" required>
        <input type="number" step="0.01" id="cashOut" placeholder="Cash-out x" required>
        <button type="submit">Add Bet</button>
        </form>

        <h2>Current Bets</h2>
        <table border="1" id="betsTable">
        <thead>
            <tr><th>Name</th><th>Amount</th><th>Cash-out</th></tr>
        </thead>
        <tbody></tbody>
        </table>

        <script type="module" src="js/admin.js"></script>
    </body>
</html>
