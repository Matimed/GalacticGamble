<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galactic Gamble</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="css/main.css">
  <link rel="stylesheet" type="text/css" href="css/rocket.css">
</head>
<body>
  <div class="game-container">
    <h1 class="game-title">Galactic Gamble - Crash Game</h1>
    <div id="historyContainer">
      <div id="historyStrip" class="strip"></div>
    </div>

    <div class="multiplier-container">
      <span class="multiplier" id="multiplier">1.0x</span>
    </div>

    <div class="hud">
      <table id="betsTable">
        <thead> <tr id="betsSummary"></tr> </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="connection-overlay" id="connectionOverlay">
    <div class="connection-message" id="connectionMsg"></div>
  </div>


  <div class="main">
    <img src="assets/spacecraft.svg" class="rocket" id="rocket"/>
    <canvas id="ignition" width="800" height="400"></canvas>
  </div>
  <canvas id="stars"></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
