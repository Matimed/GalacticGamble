services:
  server:
    build:
      context: ./server
    container_name: galacticgamble-server
    environment: 
      - NODE_ENV=development
      - WS_HOST=${WS_HOST}
      - WS_PORT=${WS_PORT}
    ports:
      - "${WS_PORT}:${WS_PORT}"
    volumes:
      - ./server:/app
      - /app/node_modules 
    command: npm run dev

  frontend:
    build: ./frontend
    environment:
      - WS_HOST=${WS_HOST}
      - WS_PORT=${WS_PORT}
    ports:
      - "${CLIENT_PORT}:80"
    container_name: galacticgamble-front
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - config_data:/config_data
    depends_on:
      - server


volumes:
  config_data: